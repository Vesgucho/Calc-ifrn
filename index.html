<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora IFRN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="container">

    <button class="theme-toggle" type="button" onclick="alternarTema()" aria-label="Alternar tema" id="themeButton">☀</button>

    <button class="gear" type="button" onclick="abrirModalConfig()" aria-label="Abrir configurações">
      <svg viewBox="0 0 24 24">
        <path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.1 7.1 0 0 0-1.63-.94L14.39 2.8a.5.5 0 0 0-.49-.4h-3.8a.5.5 0 0 0-.49.4l-.36 2.52c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.23.4.32.6.22l2.39-.96c.51.4 1.05.71 1.63.94l.36 2.52c.04.23.24.4.49.4h3.8c.25 0 .45-.17.49-.4l.36-2.52c.58-.23 1.12-.54 1.63-.94l2.39.96c.21.1.47.01.6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
      </svg>
    </button>

    <div class="cabecalho">
      <h1>Calculadora IFRN</h1>
      <p class="subtitle">Escore padronizado</p>
    </div>

    <div class="painel-cadastro">
      <label for="prova">Prova</label>
      <select id="prova" onchange="atualizarVisibilidadeCards(); calcular();">
        <option value="matematica">Matemática</option>
        <option value="portugues">Português</option>
        <option value="redacao">Produção Textual</option>
      </select>

      <label for="escore">Escore</label>
      <input type="number" id="escore" step="0.0001" placeholder="Digite o escore">

      <button class="btn-primary" type="button" onclick="calcular(true)">Calcular</button>
      <button class="btn-secondary" type="button" onclick="limparCampos()">Limpar</button>
    </div>

    <section class="resultado">
      <div class="card" id="cardNotaFinal">
        <div class="card-title">Nota Final</div>
        <div class="card-value" id="notaFinal">--</div>
      </div>

      <div class="card" id="cardNotaReal">
        <div class="card-title">Nota Estimada</div>
        <div class="card-value" id="notaReal">--</div>
      </div>

      <div class="card" id="cardAcertos">
        <div class="card-title">Acertos</div>
        <div class="card-value" id="acertos">--</div>
      </div>
    </section>

    <div id="modalConfig" class="modal">
      <div class="modal-content">
        <h2>Configurar Parâmetros</h2>
        <p style="margin-bottom: 15px; font-size: 0.85rem; color: var(--muted);">Edite os valores padrão para cada uma das matérias do processo.</p>
        
        <div class="config-grid-scroll">
          <fieldset class="config-section">
            <legend>Matemática</legend>
            <label>Média:</label>
            <input type="number" id="media_matematica" step="0.0001">
            <label>Desvio Padrão:</label>
            <input type="number" id="desvio_matematica" step="0.0001">
          </fieldset>

          <fieldset class="config-section">
            <legend>Português</legend>
            <label>Média:</label>
            <input type="number" id="media_portugues" step="0.0001">
            <label>Desvio Padrão:</label>
            <input type="number" id="desvio_portugues" step="0.0001">
          </fieldset>

          <fieldset class="config-section">
            <legend>Produção Textual</legend>
            <label>Média:</label>
            <input type="number" id="media_redacao" step="0.0001">
            <label>Desvio Padrão:</label>
            <input type="number" id="desvio_redacao" step="0.0001">
          </fieldset>
        </div>

        <button class="btn-primary" type="button" onclick="salvarConfiguracoes()" style="margin-top: 15px;">Salvar Tudo</button>
        <button class="btn-secondary" type="button" onclick="fecharModalConfig()">Cancelar</button>
      </div>
    </div>

    <div id="modalAlerta" class="modal alert-modal">
      <div class="modal-content alert-content">
        <h3 style="color: #ff4d4d; margin-bottom: 10px;">Aviso de Limite</h3>
        <p id="textoAlerta">O valor calculado excede os limites permitidos.</p>
        <button class="btn-primary" type="button" onclick="fecharAlertaOk()" style="margin-top: 15px; background: #ff4d4d;">OK</button>
      </div>
    </div>

  </main>

  <div class="toast" id="toast"></div>

  <script src="assets/js/script.js"></script>
</body>
</html>
