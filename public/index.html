<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora IFRN-CNAT</title>
<link href="style.css" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1>Calculadora IFRN-CNAT</h1>

  <select id="prova">
    <option value="matematica">Matemática</option>
    <option value="portugues">Português</option>
    <option value="redacao">Produção Textual</option>

  <input type="number" id="escore" value="551.6423" placeholder="Escore">

  <button onclick="calcular()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script src="script.js"></script>
</body>
</html>
